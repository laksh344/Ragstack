name: Deploy to GCP Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID:  ${{ secrets.GCP_PROJECT_ID }}
  REGION:      us-central1
  SERVICE:     ragstack
  IMAGE:       gcr.io/${{ secrets.GCP_PROJECT_ID }}/ragstack

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Auth ─────────────────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── Build frontend ───────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ""   # relative URLs via rewrite in production
        run: npm run build

      # ── Build & push Docker image ────────────────────────────
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # ── Deploy to Cloud Run ──────────────────────────────────
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region:  ${{ env.REGION }}
          image:   ${{ env.IMAGE }}:${{ github.sha }}
          env_vars: |
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}
            COHERE_API_KEY=${{ secrets.COHERE_API_KEY }}
            TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
            QDRANT_HOST=${{ secrets.QDRANT_HOST }}
            ES_HOST=${{ secrets.ES_HOST }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            LANGCHAIN_PROJECT=ragstack
            LANGCHAIN_TRACING_V2=true
          flags: |
            --min-instances=0
            --max-instances=3
            --memory=2Gi
            --cpu=1
            --timeout=300

      - name: Show service URL
        run: |
          echo "Deployed to: $(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')"

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system ".[dev]"

      - name: Lint
        run: ruff check backend/ tests/

      - name: Type check
        run: mypy backend/ --ignore-missing-imports

      - name: Unit tests
        run: pytest tests/ -v --cov=backend --cov-report=term-missing -k "not integration"
